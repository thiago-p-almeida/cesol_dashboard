app = "cesol-pro"
primary_region = "gru"
swap_size_mb = 512

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Trava a máquina no plano 100% gratuito
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256