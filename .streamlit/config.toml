[theme]

# Base configuration - cores sobrescritas via CSS injection
primaryColor = "#10B981"
backgroundColor = "#F8FAFC" 
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1E293B"
font = "sans serif"  # Inter aplicada via CSS global

[server]
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
# Permitir execução de módulos externos
enforceSerializableSessionState = false
